body{

text-align:center;
background:linear-gradient(#e8f4ff,#ffffff);
margin:0;
padding:20px;

}

h1{
font-size:40px;
}

#timer{

font-size:48px;
font-weight:bold;
color:#ff3b3b;
margin:10px;

}

#flag{

width:280px;
margin:15px auto;
display:block;
border:2px solid #ccc;

}

/* クイズボタン */

#choices{

display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
max-width:400px;
margin:auto;

}

#choices button{

font-size:20px;
padding:15px;
border-radius:10px;
border:none;
background:#4da6ff;
color:white;
cursor:pointer;

}

#choices button:hover{

background:#2f8cff;

}

/* モードボタン */

#modeGrid{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
max-width:450px;
margin:20px auto;

}

#modeGrid button{

font-size:18px;
padding:12px;
border:none;
border-radius:10px;
background:#444;
color:white;
cursor:pointer;

}

#modeGrid button:hover{

background:#222;

}

/* ランキング */

#ranking{

display:grid;
grid-template-columns:1fr 1fr;
gap:5px;
max-width:500px;
margin:auto;
text-align:left;
background:white;
padding:10px;
border-radius:10px;

}

</style>
</head>

let current
let score=0
let question=0
let maxQuestion=0
let questionList=[]
let gameMode=""
let startTime=0
let timerInterval

function shuffle(array){
return array.sort(()=>Math.random()-0.5)
}

function getCountriesByNames(names){
return countries.filter(c=>names.includes(c.name))
}

function startGame(mode){

gameMode=mode
score=0
question=0

startTime=Date.now()

clearInterval(timerInterval)

timerInterval=setInterval(updateTimer,100)

let list

if(mode==="all"){
list=[...countries]
}

else if(mode==="10"){
list=[...countries]
maxQuestion=10
}

else if(mode==="lv1"){
list=getCountriesByNames(level1)
}

else if(mode==="lv2"){
list=getCountriesByNames(level2)
}

else if(mode==="lv3"){
list=getCountriesByNames(level3)
}

else if(mode==="lv4"){
list=getCountriesByNames(level4)
}

else if(mode==="lv5"){
list=getCountriesByNames(level5)
}

questionList=shuffle(list)

if(mode!=="10"){
maxQuestion=questionList.length
}

document.getElementById("rankingTitle").textContent="ランキング"

showRanking(mode)

nextQuestion()

}

function updateTimer(){

let time=(Date.now()-startTime)/1000

document.getElementById("timer").textContent=
time.toFixed(1)+" 秒"

}

function nextQuestion(){

document.getElementById("result").textContent=""

if(question>=maxQuestion){

finishGame()
return

}

let correct=questionList[question]

current=correct

question++

document.getElementById("flag").src="flags/"+correct.code+".png"

let pool=countries.filter(c=>c.code!==correct.code)

shuffle(pool)

let choices=[correct,pool[0],pool[1],pool[2]]

choices=shuffle(choices)

let html=""

choices.forEach(c=>{
html+=`<button onclick="answer('${c.name}')">${c.name}</button>`
})

document.getElementById("choices").innerHTML=html

document.getElementById("score").textContent=
"問題:"+question+" / "+maxQuestion+" 正解:"+score

}

function answer(name){

if(name===current.name){

score++
document.getElementById("result").textContent="⭕ 正解！"

}else{

document.getElementById("result").textContent=
"❌ 不正解 正解は "+current.name

}

setTimeout(nextQuestion,700)

}

function finishGame(){

clearInterval(timerInterval)

let time=(Date.now()-startTime)/1000

document.getElementById("flag").src=""
document.getElementById("choices").innerHTML=""

document.getElementById("result").textContent=
"終了！ "+score+" / "+maxQuestion+
" タイム "+time.toFixed(1)+" 秒"

saveRanking(score,time,gameMode)

showRanking(gameMode)

}

function saveRanking(score,time,mode){

let key="ranking_"+mode

let name=prompt("名前を入力")

let ranking=JSON.parse(localStorage.getItem(key)||"[]")

ranking.push({name,score,time})

ranking.sort((a,b)=>{

if(b.score!==a.score){
return b.score-a.score
}

return a.time-b.time

})

ranking=ranking.slice(0,10)

localStorage.setItem(key,JSON.stringify(ranking))

}

function showRanking(mode){

let key="ranking_"+mode

let ranking=JSON.parse(localStorage.getItem(key)||"[]")

let html=""

ranking.forEach((r,i)=>{

html+=(i+1)+"位 "+r.name+" "+r.score+"問 "+r.time.toFixed(1)+"秒<br>"

})

document.getElementById("ranking").innerHTML=html

}

function resetRanking(){

if(confirm("ランキングをリセットしますか？")){

localStorage.clear()

showRanking(gameMode)

}

}

let tCount=0

function titleTap(){

titleTapCount++

if(titleTapCount>=5){

let pass = prompt("パスワードを入力してください")

if(pass==="teacher"){

document.getElementById("teacher").style.display="block"

}else{

alert("パスワードが違います")

}

titleTapCount=0

}

}
